name: Build NEXUS APK

on:
  # Solo compila cuando tú presionas "Run workflow" en GitHub Actions
  workflow_dispatch:
    inputs:
      reason:
        description: 'Razón del build (opcional)'
        required: false
        default: 'Build manual'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x nexus/gradlew

      - name: Build Debug APK
        run: cd nexus && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NEXUS-debug
          path: nexus/app/build/outputs/apk/debug/app-debug.apk
