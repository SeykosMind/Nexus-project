name: Build NEXUS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Compilar APK
        run: |
          cd nexus
          chmod +x gradlew
          # Esto evita que GitHub mate el proceso por falta de memoria (Error 143)
          export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false"
          ./gradlew assembleDebug --no-daemon

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: nexus-apk
          # Tu APK se genera aquí según tu carpeta 'app' dentro de 'nexus'
          path: nexus/app/build/outputs/apk/debug/app-debug.apk
