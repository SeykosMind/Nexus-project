name: Build NEXUS APK

on:
  push:
    branches: [ main, master, principal ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Gradle Wrapper
        working-directory: nexus
        run: gradle wrapper --gradle-version 8.6

      - name: Build APK
        working-directory: nexus
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-apk
          path: nexus/app/build/outputs/apk/debug/app-debug.apk
