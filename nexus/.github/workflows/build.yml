name: Build NEXUS APK
on:
  push:
      branches: [ principal ]
        workflow_dispatch:
        jobs:
          build:
              runs-on: ubuntu-latest
                  steps:
                        - uses: actions/checkout@v4
                              - uses: actions/setup-java@v4
                                      with:
                                                java-version: '17'
                                                          distribution: 'temurin'
                                                                - name: Build
                                                                        working-directory: nexus
                                                                                run: |
                                                                                          chmod +x gradlew
                                                                                                    ./gradlew assembleDebug --no-daemon
                                                                                                          - uses: actions/upload-artifact@v4
                                                                                                                  with:
                                                                                                                            name: nexus-apk
                                                                                                                                      path: nexus/app/build/outputs/apk/debug/app-debug.apk
