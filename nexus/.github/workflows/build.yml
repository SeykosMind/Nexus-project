name: Build NEXUS APK

on:
  push:
    branches: [ main ]  # Cambié 'principal' a 'main' porque es lo que sale en tu captura
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Compilar APK
        # Aquí entramos a la carpeta 'nexus' antes de ejecutar nada
        run: |
          cd nexus
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: nexus-apk
          path: nexus/app/build/outputs/apk/debug/app-debug.apk
